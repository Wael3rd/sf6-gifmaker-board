  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2a(SALT),iterations:300000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(IV)},key,b2a(CT));
  sessionStorage.setItem('sf6pw',pw);
  document.open();document.write(new TextDecoder().decode(pt));document.close();}
async function tryOpen(pw){
  document.getElementById('err').textContent='dechiffrement...';
  try{await open(pw)}catch(e){document.getElementById('err').textContent='mot de passe incorrect';document.getElementById('pw').value=''}}
document.getElementById('go').onclick=()=>tryOpen(document.getElementById('pw').value);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key=='Enter')tryOpen(e.target.value)});
const saved=sessionStorage.getItem('sf6pw');
if(saved)tryOpen(saved);
</script></body></html>
